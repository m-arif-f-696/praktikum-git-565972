<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Net Flow</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="hero bg-transparent min-h-screen">
      <div class="hero-content text-center flex-col">
        <div class="max-w-xl">
          <div
            class="flex justify-center gap-1.5 items-center py-1 px-2 mx-auto border-1 rounded-full border-slate-500 w-fit">
            <span class="py-0.5 px-2 bg-primary rounded-full text-base-100"
              >New</span
            >
            <p>Version 1.0 has launch</p>
          </div>
          <h1 class="text-5xl font-bold mt-3">
            Find Your Dream Hotspot<br />with
            <span class="text-primary">NetFlow</span>
          </h1>

          <p class="py-6">
            Provident cupiditate voluptatem et in. Quaerat fugiat ut assumenda
            excepturi exercitationem quasi. In deleniti eaque aut repudiandae et
            a id nisi.
          </p>
          <div class="flex gap-4 items-center justify-center">
            <button class="btn btn-primary">Find Provider</button>
            <button class="btn btn-outline btn-primary">
              Become as Provider
            </button>
          </div>
        </div>
        <div class="flex items-center justify-center relative z-20">
          <div
            class="flex flex-col gap-3 bg-white shadow-md absolute top-1/2 right-1/2 rounded-lg px-4 py-2 z-20">
            <div class="flex items-center gap-4">
              <img src="logo.svg" class="w-8 h-8 flex-1" alt="logo" />
              <div class="flex flex-col items-start">
                <span class="flex-3 font-bold text-sm">Niaga Net</span>
                <p class="text-xs text-slate-400">Sleman</p>
              </div>
            </div>

            <div class="flex gap-2">
              <span class="bg-slate-200 rounded-md px-2 py-1 text-xs"
                >Wifi</span
              >
            </div>
          </div>
          <img
            class="w-[75%] relative -bottom-24"
            src="globe.svg"
            alt="globe" />
        </div>
      </div>
    </div>
  </body>
</html>
